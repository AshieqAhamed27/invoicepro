services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: invoicepro-backend
    env_file:
      - ./backend/.env
    environment:
      PORT: 5000
      CODE_RUNNER_ENABLED: "true"
    ports:
      - "5000:5000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:5000/api/health').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))"
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
