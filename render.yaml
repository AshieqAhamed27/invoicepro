services:
  - type: web
    name: invoicepro-api
    env: node
    rootDir: invoicepro/backend
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
      - key: RAZORPAY_MONTHLY_PLAN_ID
        sync: false
      - key: RAZORPAY_YEARLY_PLAN_ID
        sync: false
      - key: PRO_MONTHLY_AMOUNT
        sync: false
      - key: PRO_YEARLY_AMOUNT
        sync: false
      - key: PAYMENT_SIMULATION
        value: "false"
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5-mini
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: EMAIL_FROM_NAME
        value: ClientFlow AI
      - key: EMAIL_FROM
        sync: false
      - key: CRON_SECRET
        sync: false
